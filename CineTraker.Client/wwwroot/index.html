<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineTraker.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CineTraker.Client.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.inicializarScrollInfinito = (dotNetHelper) => {
            window.onscroll = () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                    dotNetHelper.invokeMethodAsync('CargarSiguientePagina');
                }
            };
        };
    </script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script>
        window.inicializarGrafo = (data) => {
            console.log("Datos recibidos:", data); // Mirá esto en la consola F12
            const nodosData = data.nodos || data.Nodos;
            const aristasData = data.aristas || data.Aristas;
            const container = document.getElementById('graph-container');
            if (!container) return; // Seguridad por si el div no está listo

            const nodes = new vis.DataSet(data.nodos.map(n => ({
                id: n.id,
                label: n.titulo,
                shape: 'circularImage',
                image: n.posterUrl,
                size: n.grupo === "Central" ? 40 : 25,
                color: {
                    border: n.grupo === "Central" ? "#0078d4" : "#28a745",
                    background: "#1a1a1a"
                },
                font: { color: '#ffffff', size: 14, strokeWidth: 2, strokeColor: '#000000' }
            })));

            const edges = new vis.DataSet(data.aristas.map(e => ({
                from: e.sourceId,
                to: e.targetId,
                label: e.relacion,
                arrows: 'to',
                color: { color: '#0078d4' },
                font: { align: 'middle', color: '#ffffff', size: 10 }
            })));

            const options = {
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -3000,
                        springLength: 150
                    }
                },
                nodes: {
                    borderWidth: 3,
                    shadow: true
                },
                edges: {
                    width: 2,
                    shadow: true
                }
            };

            new vis.Network(container, { nodes, edges }, options);
        };
    </script>
</body>

</html>
