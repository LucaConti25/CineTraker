<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineTraker.Client</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="CineTraker.Client.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        window.inicializarScrollInfinito = (dotNetHelper) => {
            window.onscroll = () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                    dotNetHelper.invokeMethodAsync('CargarSiguientePagina');
                }
            };
        };
    </script>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <script>
        let network = null;
        let nodes = null;
        let edges = null;
        let dotNetReference = null;

        window.inicializarGrafo = (data, dotNetHelper) => {
            dotNetReference = dotNetHelper;
            const container = document.getElementById('graph-container');

            if (!container) return;

            if (network !== null) {
                network.destroy();
                network = null;
            }

            const nodosRaw = data.nodos || data.Nodos;
            const aristasRaw = data.aristas || data.Aristas;

            nodes = new vis.DataSet(nodosRaw.map(n => transformarNodo(n)));
            edges = new vis.DataSet(aristasRaw.map(e => transformarArista(e)));

            const options = {
                physics: {
                    enabled: true,
                    barnesHut: { gravitationalConstant: -3000, springLength: 150 }
                },
                nodes: { borderWidth: 3, shadow: true },
                edges: { width: 2, shadow: true, arrows: 'to' }
            };

            network = new vis.Network(container, { nodes, edges }, options);

            // Evento de clic para Blazor
            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    dotNetReference.invokeMethodAsync('SeleccionarPeliculaDesdeMapa', nodeId);
                }
            });
        };

        function transformarNodo(n) {
            const id = n.id || n.Id;
            const titulo = n.titulo || n.Titulo;
            const posterUrl = n.posterUrl || n.PosterUrl;
            const grupo = n.grupo || n.Grupo;
            const esVisto = n.isWatched || n.IsWatched;

            return {
                id: id,
                label: titulo,
                shape: 'circularImage',
                image: posterUrl,
                size: grupo === "Central" ? 40 : 25,
                color: {
                    border: esVisto ? "#6c757d" : (grupo === "Central" ? "#0078d4" : "#28a745"),
                    background: "#1a1a1a"
                },
                imagePadding: 0,
                shapeProperties: { useImageSize: false },
                chosen: true,
                font: { color: '#ffffff', strokeWidth: 2, strokeColor: '#000000' },
                opacity: esVisto ? 0.6 : 1
            };
        }

        function transformarArista(e) {
            const source = e.sourceId || e.SourceId;
            const target = e.targetId || e.TargetId;
            const relacion = e.relacion || e.Relacion;
            return { from: source, to: target, label: relacion };
        }

        window.inyectarNodos = (nuevoGrafo) => {
            const nuevosNodosRaw = nuevoGrafo.nodos || nuevoGrafo.Nodos;
            const nuevasAristasRaw = nuevoGrafo.aristas || nuevoGrafo.Aristas;

            nuevosNodosRaw.forEach(n => {
                const id = n.id || n.Id;
                if (!nodes.get(id)) {
                    nodes.add(transformarNodo(n));
                }
            });

            nuevasAristasRaw.forEach(e => {
                const source = e.sourceId || e.SourceId;
                const target = e.targetId || e.TargetId;
                const exists = edges.get({
                    filter: (item) => item.from === source && item.to === target
                });
                if (exists.length === 0) {
                    edges.add(transformarArista(e));
                }
            });
        };

        window.obtenerSnapshotGrafo = () => {
            if (!network || !nodes || !edges) return "";

            const posiciones = network.getPositions();
            const nodosSnapshot = nodes.get().map(n => {
                return {
                    ...n,
                    x: posiciones[n.id] ? posiciones[n.id].x : 0,
                    y: posiciones[n.id] ? posiciones[n.id].y : 0
                };
            });

            const aristasSnapshot = edges.get();
            return JSON.stringify({ nodos: nodosSnapshot, aristas: aristasSnapshot });
        };

        window.obtenerIdsNodos = () => {
            if (!nodes) return [];
            return nodes.getIds(); // Devuelve un array de los IDs de todos los nodos actuales
        };

        window.cargarMapaDesdeJson = (jsonString, dotNetHelper) => {
            dotNetReference = dotNetHelper;
            const container = document.getElementById('graph-container');
            if (!container || !jsonString) return;

            const data = JSON.parse(jsonString);

            // Reconstruimos los DataSets con la data que viene de la DB
            nodes = new vis.DataSet(data.nodos);
            edges = new vis.DataSet(data.aristas);

            const options = {
                // Desactivamos la física inicial para que respeten las posiciones x, y guardadas
                physics: { enabled: false },
                nodes: { borderWidth: 3, shadow: true },
                edges: { width: 2, shadow: true, arrows: 'to' }
            };

            network = new vis.Network(container, { nodes, edges }, options);

            // Reactivamos el evento de clic para poder seguir expandiendo
            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    dotNetReference.invokeMethodAsync('SeleccionarPeliculaDesdeMapa', nodeId);
                }
            });
        };
    </script>
</body>

</html>
